name: Download page

# Builds the /download landing page (site/) into a static bundle, verifies it
# end-to-end in a headless browser, regenerates the locale/theme preview
# screenshots, and deploys to GitHub Pages on pushes to main.

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'scripts/test-pages-e2e.mjs'
      - 'scripts/update-preview-images.mjs'
      - 'scripts/site-static-server.mjs'
      - '.github/workflows/pages.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'scripts/test-pages-e2e.mjs'
      - 'scripts/update-preview-images.mjs'
      - 'scripts/site-static-server.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Only one Pages deployment per ref at a time; queue (don't cancel) so an
# in-flight deploy completes before the next starts.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env: # Force Node.js 24 for actions without native support. See issue #1417.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # === BUILD + VERIFY ===
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: npm

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build static download page
        run: npm run build:site

      - name: Install Playwright (kept out of published deps)
        # playwright is a heavy, browser-bearing dependency only needed for the
        # page e2e test and screenshot capture, so it is installed with
        # --no-save rather than declared in package.json.
        run: |
          npm install --no-save playwright@1.59.1
          npx playwright install --with-deps chromium

      - name: Run download page e2e checks
        run: npm run test:pages:e2e -- --site-dir site/dist

      - name: Regenerate preview screenshots
        run: npm run preview:update -- --skip-build

      - name: Upload preview screenshots artifact
        uses: actions/upload-artifact@v7
        with:
          name: download-page-screenshots
          path: docs/screenshots/download/
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  # === DEPLOY (main only) ===
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
