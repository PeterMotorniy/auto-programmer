name: Download page

# Builds the /download landing page (site/) into a static bundle, verifies it
# end-to-end in a headless browser, regenerates the locale/theme preview
# screenshots, and deploys to GitHub Pages on pushes to main.

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'scripts/test-pages-e2e.mjs'
      - 'scripts/update-preview-images.mjs'
      - 'scripts/site-static-server.mjs'
      - '.github/workflows/pages.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'scripts/test-pages-e2e.mjs'
      - 'scripts/update-preview-images.mjs'
      - 'scripts/site-static-server.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Supersede stale PR runs, but never cancel a main deploy mid-flight (let an
# in-flight Pages deployment finish before the next starts).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env: # Force Node.js 24 for actions without native support. See issue #1417.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # === BUILD + VERIFY ===
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    # Backstop against a hung browser download (the playwright CDN can stall a
    # connection with no built-in timeout); the retry step below recovers from
    # most stalls, this just prevents a runaway job in the worst case.
    timeout-minutes: 20
    env:
      PLAYWRIGHT_VERSION: 1.59.1
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: npm

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build static download page
        run: npm run build:site

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ env.PLAYWRIGHT_VERSION }}-${{ runner.os }}

      - name: Install Playwright package (kept out of published deps)
        # playwright is a heavy, browser-bearing dependency only needed for the
        # page e2e test and screenshot capture, so it is installed with
        # --no-save rather than declared in package.json. Skip the postinstall
        # browser download here — it has no timeout and could stall; the next
        # step performs the download under a timeout+retry guard instead.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm install --no-save playwright@"$PLAYWRIGHT_VERSION"

      - name: Install Playwright Chromium (retry on stalled download)
        # The playwright CDN occasionally stalls a download with no internal
        # timeout, hanging the job. Cap each attempt with `timeout` and retry so
        # a transient stall self-heals instead of blocking CI. On a cache hit the
        # browser is already present, so this mostly just runs the apt deps step.
        run: |
          for attempt in 1 2 3; do
            if timeout 360 npx playwright install --with-deps chromium; then
              echo "Playwright Chromium installed on attempt $attempt"
              exit 0
            fi
            echo "::warning::Playwright install attempt $attempt failed or timed out; retrying in 10s"
            sleep 10
          done
          echo "::error::Playwright Chromium install failed after 3 attempts"
          exit 1

      - name: Run download page e2e checks
        run: npm run test:pages:e2e -- --site-dir site/dist

      - name: Regenerate preview screenshots
        run: npm run preview:update -- --skip-build

      - name: Upload preview screenshots artifact
        uses: actions/upload-artifact@v7
        with:
          name: download-page-screenshots
          path: docs/screenshots/download/
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  # === DEPLOY (main only) ===
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
