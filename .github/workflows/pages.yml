name: Download page

# Builds the /download landing page (site/) into a static bundle, verifies it
# end-to-end in a headless browser, regenerates the locale/theme preview
# screenshots, and deploys to GitHub Pages on pushes to main.

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'scripts/test-pages-e2e.mjs'
      - 'scripts/update-preview-images.mjs'
      - 'scripts/site-static-server.mjs'
      - '.github/workflows/pages.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'scripts/test-pages-e2e.mjs'
      - 'scripts/update-preview-images.mjs'
      - 'scripts/site-static-server.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Supersede stale PR runs, but never cancel a main deploy mid-flight (let an
# in-flight Pages deployment finish before the next starts).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env: # Force Node.js 24 for actions without native support. See issue #1417.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # === BUILD + VERIFY ===
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    # Run inside the official Playwright image so the Chromium browser and all
    # of its system libraries are baked in — no CDN download at all. This avoids
    # the playwright CDN stall (it can hang *after* the 170 MiB archive reaches
    # 100%, during extraction or the next component's connection, a phase the
    # download's own socket timeout does not cover). The image ships Node 24,
    # matching the repo, and sets PLAYWRIGHT_BROWSERS_PATH=/ms-playwright so the
    # locally installed playwright package finds the pre-baked browser.
    # NOTE: keep this tag in sync with PLAYWRIGHT_VERSION below.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 15
    env:
      PLAYWRIGHT_VERSION: 1.59.1
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: npm

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build static download page
        run: npm run build:site

      - name: Install Playwright package (browser pre-baked in the image)
        # playwright is a heavy, browser-bearing dependency only needed for the
        # page e2e test and screenshot capture, so it is installed with
        # --no-save rather than declared in package.json. The browser itself is
        # already present in the image (found via PLAYWRIGHT_BROWSERS_PATH), so
        # skip the postinstall download entirely.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm install --no-save playwright@"$PLAYWRIGHT_VERSION"

      - name: Run download page e2e checks
        run: npm run test:pages:e2e -- --site-dir site/dist

      - name: Regenerate preview screenshots
        run: npm run preview:update -- --skip-build

      - name: Upload preview screenshots artifact
        uses: actions/upload-artifact@v7
        with:
          name: download-page-screenshots
          path: docs/screenshots/download/
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  # === DEPLOY (main only) ===
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
