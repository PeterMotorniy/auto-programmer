  artifacthub.io/readme: |
    # Auto Programmer Helm Chart

    Deploy Auto Programmer on Kubernetes - the master AI that controls a hive of AI agents.

    ## Prerequisites

    - Kubernetes 1.19+
    - Helm 3.0+

    ## Installation

    ```bash
    helm repo add PeterMotorniy https://PeterMotorniy.github.io/auto-programmer
    helm repo update
    helm install auto-programmer PeterMotorniy/auto-programmer
    ```

    ## Configuration

    See values.yaml for all configurable options.
